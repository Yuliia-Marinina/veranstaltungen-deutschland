<div class="detail-body">
  <div class="container">
    <!-- Breadcrumb -->
    <nav class="breadcrumb-bar" aria-label="Breadcrumb">
      <ol class="breadcrumb-inner">
        <li><a href="index.html">Startseite</a></li>
        <li aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6" /></svg>
        </li>
        <li>
          <span class="breadcrumb-current" id="detail-breadcrumb" aria-current="page"
            >Veranstaltung</span
          >
        </li>
      </ol>
    </nav>

    <div class="detail-body-inner">
      <!-- ── LEFT ── -->
      <div class="detail-left">
        <!-- Beschreibung -->
        <section class="detail-section" aria-labelledby="detail-section-desc">
          <h2 class="detail-section-title" id="detail-section-desc">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            Über die Veranstaltung
          </h2>
          <p class="detail-desc" id="detail-description">--</p>
        </section>

        <!-- Wetter & Tidenkalender -->
        <section class="detail-section" aria-labelledby="detail-section-weather">
          <h2 class="detail-section-title" id="detail-section-weather">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"
              />
              <path
                d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"
              />
            </svg>
            Wetter & Tidenkalender am Eventtag
          </h2>

          <div class="weather-widget-grid" id="detail-weather-forecast" aria-live="polite"
            aria-label="Wettervorhersage">

          <div id="detail-warning" aria-live="polite"></div>
        </section>
      </div>

      <!-- ── RIGHT ── -->
      <div class="detail-right">
        <!-- Tickets -->
        <div class="detail-tickets">
          <div class="detail-tickets-label">Tickets & Einlass</div>
          <div class="detail-price" id="detail-price" aria-live="polite">Ab 0 €</div>
          <div class="detail-price-sub">zzgl. Gebühren · Ticketmaster</div>

          <a
            href=""
            class="btn btn-primary detail-card-btn"
            id="detail-ticket-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-disabled="true"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"
              />
            </svg>
            Tickets kaufen
          </a>

          <button
            class="detail-bookmark-btn"
            id="detail-bookmark-btn"
            type="button"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
            Zur Merkliste hinzufügen
          </button>

          <div class="ticket-info" role="note">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Tickets werden über Ticketmaster bereitgestellt. Preise können variieren.
          </div>
        </div>

        <!-- Veranstaltungsinfo -->
        <div class="detail-tickets" id="detail-info-card">
          <div class="detail-tickets-label">Veranstaltungsinfo</div>
          <div class="detail-card-row">
            <i data-lucide="calendar" aria-hidden="true"></i>
            <span class="detail-card-value" id="detail-card-date">--</span>
          </div>
          <div class="detail-card-row">
            <i data-lucide="clock" aria-hidden="true"></i>
            <span class="detail-card-value" id="detail-card-time">--</span>
          </div>
          <div class="detail-card-row">
            <i data-lucide="map-pin" aria-hidden="true"></i>
            <span class="detail-card-value" id="detail-card-region">--</span>
          </div>
          <div class="detail-card-row">
            <i data-lucide="map" aria-hidden="true"></i>
            <span class="detail-card-value" id="detail-card-address">--</span>
          </div>
        </div>

        <!-- Karte -->
        <div class="detail-map-card">
          <div class="detail-map-card-header">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 10c0 6-8 13-8 13s-8-7-8-13a8 8 0 0 1 16 0Z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span class="detail-map-card-header-title" id="detail-map-title"
              >Veranstaltungsort</span
            >
          </div>
          <div
            class="detail-map"
            id="detail-map"
            role="application"
            aria-labelledby="detail-map-title"
          ></div>
          <div class="detail-map-card-footer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span id="detail-card-address-link">--</span>
          </div>
        </div>

        <!-- Wasserstand -->
        <div id="detail-water" aria-live="polite"></div>
      </div>
    </div>
  </div>
</div>
